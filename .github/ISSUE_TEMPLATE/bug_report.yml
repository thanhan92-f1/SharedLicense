name: Bug report
description: Report a problem with the SharedLicense HostBill module
title: "[Bug]: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Please do **not** include Bearer tokens or sensitive customer data.
  - type: input
    id: module_version
    attributes:
      label: Module version
      description: From `SharedLicense::$version`
      placeholder: "1.0.1"
    validations:
      required: true
  - type: input
    id: hostbill_version
    attributes:
      label: HostBill version
      placeholder: "e.g. 202x.x"
    validations:
      required: false
  - type: input
    id: php_version
    attributes:
      label: PHP version
      placeholder: "e.g. 7.4 / 8.1"
    validations:
      required: false
  - type: textarea
    id: what_happened
    attributes:
      label: What happened?
      description: Provide steps to reproduce and expected vs actual behavior.
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste sanitized logs or error messages.
      render: shell
    validations:
      required: false
